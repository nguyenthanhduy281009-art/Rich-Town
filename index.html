<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich-Town - Đăng nhập</title>

<style>
:root{
    --main:#f4b400;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#111,#222);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:350px;
    background:#1b1b1b;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,0,0,.5);
    color:white;
}

.logo{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:var(--main);
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:8px;
    background:#111;
    color:white;
    margin-bottom:10px;
}

.input-group{
    position:relative;
}

.show-btn{
    position:absolute;
    right:8px;
    top:8px;
    border:none;
    background:#333;
    color:white;
    padding:6px 8px;
    border-radius:5px;
    cursor:pointer;
}

.main-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:var(--main);
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.link{
    text-align:center;
    margin-top:15px;
    color:var(--main);
    cursor:pointer;
}

.forgot{
    text-align:right;
    font-size:13px;
    color:#999;
    margin-bottom:10px;
    cursor:pointer;
}

#error{
    margin-top:10px;
    color:#ff6666;
    text-align:center;
    min-height:20px;
}
</style>
</head>
<body>

<div class="box">

    <div class="logo">RICH-TOWN</div>
    <div class="subtitle" id="title">ĐĂNG NHẬP</div>

    <input
        type="text"
        id="username"
        placeholder="Tên nhân vật"
        style="display:none"
    >

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <div class="input-group">
        <input
            type="password"
            id="password"
            placeholder="Mật khẩu"
        >
        <button class="show-btn" onclick="togglePass(event)">
            HIỆN
        </button>
    </div>

    <div class="forgot" id="forgotBtn" onclick="forgotPass()">
        Quên mật khẩu?
    </div>

    <button class="main-btn" onclick="handleAuth()" id="submitBtn">
        ĐĂNG NHẬP
    </button>

    <div id="error"></div>

    <div class="link" onclick="switchMode()" id="switchText">
        Chưa có tài khoản? Đăng ký
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    sendPasswordResetEmail,
    updateProfile
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getDatabase,
    ref,
    set,
    get,
    query,
    orderByChild,
    equalTo
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeg9m4AuIJxr6PCxYnC7WJ4hmWgJPB180",
  authDomain: "rich-town.firebaseapp.com",
  databaseURL: "https://rich-town-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rich-town",
  storageBucket: "rich-town.firebasestorage.app",
  messagingSenderId: "404583018538",
  appId: "1:404583018538:web:2bdeb6f2d26f7aa4221353",
  measurementId: "G-K2S8KPCW45"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getDatabase(app);

let isLogin = true;

window.togglePass = function(event){

    const input = document.getElementById("password");

    if(input.type==="password"){
        input.type="text";
        event.target.innerText="ẨN";
    }else{
        input.type="password";
        event.target.innerText="HIỆN";
    }
}

window.switchMode = function(){

    isLogin = !isLogin;

    document.getElementById("title").innerText =
        isLogin ? "ĐĂNG NHẬP" : "ĐĂNG KÝ";

    document.getElementById("submitBtn").innerText =
        isLogin ? "ĐĂNG NHẬP" : "ĐĂNG KÝ";

    document.getElementById("switchText").innerText =
        isLogin
        ? "Chưa có tài khoản? Đăng ký"
        : "Đã có tài khoản? Đăng nhập";

    document.getElementById("username").style.display =
        isLogin ? "none" : "block";

    document.getElementById("forgotBtn").style.display =
        isLogin ? "block" : "none";

    document.getElementById("error").innerText="";
}

window.forgotPass = async function(){

    const email =
        document.getElementById("email").value.trim();

    if(!email){
        alert("Nhập Email trước!");
        return;
    }

    try{

        await sendPasswordResetEmail(auth,email);

        alert("Đã gửi email đặt lại mật khẩu.");

    }catch(error){

        alert(error.message);

    }

}

window.handleAuth = async function(){

    const email =
        document.getElementById("email").value.trim();

    const password =
        document.getElementById("password").value;

    const username =
        document.getElementById("username").value.trim();

    const errorBox =
        document.getElementById("error");

    if(!email || !password || (!isLogin && !username)){
        errorBox.innerText =
            "Vui lòng nhập đầy đủ thông tin!";
        return;
    }

    try{

        errorBox.innerText="Đang xử lý...";

        if(isLogin){

            await signInWithEmailAndPassword(
                auth,
                email,
                password
            );

            window.location.href="index.html";

        }else{

            if(username.length < 3){
                errorBox.innerText =
                    "Tên phải từ 3 ký tự trở lên!";
                return;
            }

            const result =
                await createUserWithEmailAndPassword(
                    auth,
                    email,
                    password
                );

            const nameQuery = query(
                ref(db,"users"),
                orderByChild("name"),
                equalTo(username)
            );

            const snapshot =
                await get(nameQuery);

            if(snapshot.exists()){

                errorBox.innerText =
                    "Tên nhân vật đã tồn tại!";

                return;
            }

            await updateProfile(
                result.user,
                {
                    displayName: username
                }
            );

            await set(
                ref(db,"users/"+result.user.uid),
                {
                    name: username,
                    email: email,
                    coins: 1000,
                    level: 1,
                    money: 5000,
                    houses: 0,
                    createdAt: Date.now()
                }
            );

            alert("Đăng ký thành công!");

            window.location.href="index.html";
        }

    }catch(error){

        errorBox.innerText = error.message;

    }

}

</script>

</body>
</html>
