<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich-Town | Lobby</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    :root {
      --gold: #FFD700;
      --dark: #1a1a1a;
      --glass: rgba(255, 255, 255, 0.05);
      --text-muted: #888;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle, #2c3e50, #000);
      color: white;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: var(--glass);
      backdrop-filter: blur(10px);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .avatar {
      width: 50px;
      height: 50px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: black;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logout-btn {
      background: #ff4d4d;
      border: none;
      color: white;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .logout-btn:disabled,
    .play-btn:disabled,
    .join-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      gap: 18px;
    }

    .play-btn {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      border: none;
      padding: 22px 56px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
      color: #000;
      box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
    }

    .play-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px var(--gold);
    }

    .room-form {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 360px;
    }

    .room-input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      outline: none;
      text-transform: uppercase;
      font-size: 15px;
    }

    .join-btn {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      font-weight: bold;
      white-space: nowrap;
    }

    footer {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 24px;
      background: rgba(0, 0, 0, 0.15);
    }

    .nav-item {
      cursor: pointer;
      text-align: center;
      transition: 0.3s;
      user-select: none;
    }

    .nav-item:hover {
      color: var(--gold);
    }

    .nav-icon {
      font-size: 24px;
      display: block;
      margin-bottom: 5px;
    }

    .status {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <header>
    <div class="user-info">
      <div class="avatar" id="avatar-char">RT</div>
      <div>
        <div id="username" style="font-weight: bold; font-size: 18px;">Đang tải...</div>
        <div id="userid" style="font-size: 12px; color: #888;">ID: ---</div>
        <div id="statusText" class="status">Đang kiểm tra đăng nhập...</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Đăng xuất</button>
  </header>

  <main>
    <button class="play-btn" id="playBtn" onclick="createRoom()">🎲 CHƠI NGAY</button>

    <div class="room-form">
      <input
        type="text"
        id="roomCode"
        class="room-input"
        placeholder="Nhập mã phòng..."
        maxlength="6"
        autocomplete="off"
      />
      <button class="join-btn" id="joinBtn" onclick="joinRoom()">VÀO PHÒNG</button>
    </div>
  </main>

  <footer>
    <div class="nav-item" onclick="window.location.href='friends.html'">
      <span class="nav-icon">👥</span>
      <span>Bạn bè</span>
    </div>

    <div class="nav-item" onclick="window.location.href='shop.html'">
      <span class="nav-icon">🛍️</span>
      <span>Cửa hàng</span>
    </div>
  </footer>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCeg9m4AuIJxr6PCxYnC7WJ4hmWgJPB180",
      authDomain: "rich-town.firebaseapp.com",
      databaseURL: "https://rich-town-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rich-town",
      storageBucket: "rich-town.firebasestorage.app",
      messagingSenderId: "404583018538",
      appId: "1:404583018538:web:2bdeb6f2d26f7aa4221353",
      measurementId: "G-K2S8KPCW45"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();

    const usernameEl = document.getElementById("username");
    const useridEl = document.getElementById("userid");
    const avatarEl = document.getElementById("avatar-char");
    const statusTextEl = document.getElementById("statusText");
    const playBtn = document.getElementById("playBtn");
    const joinBtn = document.getElementById("joinBtn");
    const roomInput = document.getElementById("roomCode");

    let inviteListenerStarted = false;

    auth.onAuthStateChanged(async (user) => {
      try {
        if (!user) {
          statusTextEl.textContent = "Chuyển hướng sang đăng nhập...";
          window.location.replace("auth.html");
          return;
        }

        statusTextEl.textContent = "Đã đăng nhập";
        setupPresence(user.uid);
        await loadUserData(user.uid);

        if (!inviteListenerStarted) {
          watchInvites(user.uid);
          inviteListenerStarted = true;
        }
      } catch (err) {
        console.error("Auth handler error:", err);
        statusTextEl.textContent = "Có lỗi khi tải dữ liệu";
      }
    });

    async function loadUserData(uid) {
      const snap = await db.ref(`users/${uid}`).once("value");
      const data = snap.val();

      if (!data) {
        usernameEl.textContent = "Người chơi";
        useridEl.textContent = "ID: " + uid.substring(0, 8).toUpperCase();
        avatarEl.textContent = "U";
        return;
      }

      const name = data.name || "Người chơi";
      usernameEl.textContent = name;
      useridEl.textContent = "ID: " + uid.substring(0, 8).toUpperCase();
      avatarEl.textContent = name.charAt(0).toUpperCase();
    }

    async function logout() {
      try {
        await auth.signOut();
        window.location.replace("auth.html");
      } catch (err) {
        console.error("Logout error:", err);
        alert("Đăng xuất thất bại!");
      }
    }

    function generateRoomId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID().replace(/-/g, "").slice(0, 6).toUpperCase();
      }
      return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    async function createRoom() {
      const user = auth.currentUser;
      if (!user) {
        alert("Bạn chưa đăng nhập!");
        return;
      }

      playBtn.disabled = true;

      try {
        const roomId = generateRoomId();

        const userSnap = await db.ref(`users/${user.uid}`).once("value");
        const data = userSnap.val() || {};
        const name = data.name || "Người chơi";

        await db.ref(`rooms/${roomId}`).set({
          roomId,
          hostId: user.uid,
          status: "waiting",
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          players: {
            [user.uid]: {
              name,
              ready: false,
              role: "player",
              joinedAt: firebase.database.ServerValue.TIMESTAMP
            }
          }
        });

        window.location.replace(`room.html?id=${roomId}`);
      } catch (err) {
        console.error("Create room error:", err);
        alert("Không thể tạo phòng. Vui lòng thử lại.");
      } finally {
        playBtn.disabled = false;
      }
    }

    async function joinRoom() {
      const user = auth.currentUser;
      if (!user) {
        alert("Bạn chưa đăng nhập!");
        return;
      }

      const roomId = roomInput.value.trim().toUpperCase();
      if (!roomId) {
        alert("Nhập mã phòng!");
        return;
      }

      joinBtn.disabled = true;

      try {
        const roomRef = db.ref(`rooms/${roomId}`);
        const roomSnap = await roomRef.once("value");

        if (!roomSnap.exists()) {
          alert("Phòng không tồn tại!");
          return;
        }

        const roomData = roomSnap.val();
        if (roomData.status && roomData.status !== "waiting") {
          alert("Phòng đã bắt đầu hoặc không còn ở trạng thái chờ.");
          return;
        }

        const userSnap = await db.ref(`users/${user.uid}`).once("value");
        const data = userSnap.val() || {};
        const name = data.name || "Người chơi";

        await db.ref(`rooms/${roomId}/players/${user.uid}`).set({
          name,
          ready: false,
          role: "player",
          joinedAt: firebase.database.ServerValue.TIMESTAMP
        });

        window.location.replace(`room.html?id=${roomId}`);
      } catch (err) {
        console.error("Join room error:", err);
        alert("Không thể vào phòng. Vui lòng thử lại.");
      } finally {
        joinBtn.disabled = false;
      }
    }

    function setupPresence(uid) {
      const userRef = db.ref(`users/${uid}`);
      const connectedRef = db.ref(".info/connected");

      connectedRef.on("value", (snap) => {
        if (!snap.val()) return;

        userRef.onDisconnect().update({
          status: "offline",
          lastSeen: firebase.database.ServerValue.TIMESTAMP
        });

        userRef.update({
          status: "online",
          lastSeen: firebase.database.ServerValue.TIMESTAMP
        });
      });
    }

    function watchInvites(uid) {
      db.ref(`invites/${uid}`).on("child_added", async (snap) => {
        try {
          const invite = snap.val();
          if (!invite) return;

          const accept = confirm(
            `${invite.fromName || "Ai đó"} đã mời bạn vào phòng ${invite.roomId}\n\nBạn có muốn tham gia không?`
          );

          if (accept && invite.roomId) {
            window.location.replace(`room.html?id=${invite.roomId}`);
          }

          await snap.ref.remove();
        } catch (err) {
          console.error("Invite error:", err);
        }
      });
    }

    roomInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") joinRoom();
    });
  </script>
</body>
</html>
