```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich-Town - Đăng nhập</title>

<style>
:root{
    --primary:#f4b400;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#111,#222);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    width:360px;
    background:#1c1c1c;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,0,0,.4);
    color:white;
}

.logo{
    font-size:32px;
    text-align:center;
    font-weight:bold;
    color:var(--primary);
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    margin-bottom:10px;
    outline:none;
}

.input-group{
    position:relative;
}

.show-btn{
    position:absolute;
    right:8px;
    top:7px;
    border:none;
    background:#333;
    color:white;
    padding:6px 8px;
    border-radius:5px;
    cursor:pointer;
}

.main-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:var(--primary);
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.forgot{
    text-align:right;
    color:#999;
    font-size:13px;
    cursor:pointer;
    margin-bottom:10px;
}

.switch{
    margin-top:15px;
    text-align:center;
    color:var(--primary);
    cursor:pointer;
}

#error{
    margin-top:10px;
    text-align:center;
    color:#ff6666;
    min-height:20px;
}
</style>
</head>
<body>

<div class="box">

    <div class="logo">RICH-TOWN</div>

    <div class="subtitle" id="title">
        ĐĂNG NHẬP
    </div>

    <input
        type="text"
        id="username"
        placeholder="Tên nhân vật"
        style="display:none"
    >

    <input
        type="text"
        id="loginInput"
        placeholder="Email hoặc Tên nhân vật"
    >

    <div class="input-group">

        <input
            type="password"
            id="password"
            placeholder="Mật khẩu"
        >

        <button
            class="show-btn"
            onclick="togglePass(event)"
        >
            HIỆN
        </button>

    </div>

    <div
        class="forgot"
        id="forgotBtn"
        onclick="forgotPass()"
    >
        Quên mật khẩu?
    </div>

    <button
        class="main-btn"
        onclick="handleAuth()"
        id="submitBtn"
    >
        ĐĂNG NHẬP
    </button>

    <div id="error"></div>

    <div
        class="switch"
        id="switchText"
        onclick="switchMode()"
    >
        Chưa có tài khoản? Đăng ký
    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    sendPasswordResetEmail,
    updateProfile
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getDatabase,
    ref,
    set,
    get,
    query,
    orderByChild,
    equalTo
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeg9m4AuIJxr6PCxYnC7WJ4hmWgJPB180",
  authDomain: "rich-town.firebaseapp.com",
  databaseURL: "https://rich-town-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rich-town",
  storageBucket: "rich-town.firebasestorage.app",
  messagingSenderId: "404583018538",
  appId: "1:404583018538:web:2bdeb6f2d26f7aa4221353",
  measurementId: "G-K2S8KPCW45"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let isLogin = true;

window.togglePass = function(event){

    const pass =
        document.getElementById("password");

    if(pass.type==="password"){
        pass.type="text";
        event.target.innerText="ẨN";
    }else{
        pass.type="password";
        event.target.innerText="HIỆN";
    }
}

window.switchMode = function(){

    isLogin = !isLogin;

    document.getElementById("title").innerText =
        isLogin ? "ĐĂNG NHẬP" : "ĐĂNG KÝ";

    document.getElementById("submitBtn").innerText =
        isLogin ? "ĐĂNG NHẬP" : "ĐĂNG KÝ";

    document.getElementById("switchText").innerText =
        isLogin
        ? "Chưa có tài khoản? Đăng ký"
        : "Đã có tài khoản? Đăng nhập";

    document.getElementById("forgotBtn").style.display =
        isLogin ? "block" : "none";

    document.getElementById("username").style.display =
        isLogin ? "none" : "block";

    document.getElementById("loginInput").placeholder =
        isLogin
        ? "Email hoặc Tên nhân vật"
        : "Email";

    document.getElementById("error").innerText="";
}

window.forgotPass = async function(){

    const email =
        prompt("Nhập email của bạn:");

    if(!email) return;

    try{

        await sendPasswordResetEmail(auth,email);

        alert("Đã gửi email đặt lại mật khẩu.");

    }catch(err){

        alert(err.message);

    }
}

window.handleAuth = async function(){

    const loginInput =
        document.getElementById("loginInput").value.trim();

    const password =
        document.getElementById("password").value;

    const username =
        document.getElementById("username").value.trim();

    const errorBox =
        document.getElementById("error");

    errorBox.innerText="";

    try{

        if(isLogin){

            let email = loginInput;

            // Đăng nhập bằng tên nhân vật
            if(!loginInput.includes("@")){

                const q = query(
                    ref(db,"users"),
                    orderByChild("name"),
                    equalTo(loginInput)
                );

                const snapshot = await get(q);

                if(!snapshot.exists()){

                    errorBox.innerText =
                        "Không tìm thấy tài khoản";

                    return;
                }

                const data =
                    Object.values(snapshot.val())[0];

                email = data.email;
            }

            await signInWithEmailAndPassword(
                auth,
                email,
                password
            );

            window.location.href = "index.html";

        }else{

            if(!username){

                errorBox.innerText =
                    "Nhập tên nhân vật";

                return;
            }

            const q = query(
                ref(db,"users"),
                orderByChild("name"),
                equalTo(username)
            );

            const snapshot = await get(q);

            if(snapshot.exists()){

                errorBox.innerText =
                    "Tên nhân vật đã tồn tại";

                return;
            }

            const result =
                await createUserWithEmailAndPassword(
                    auth,
                    loginInput,
                    password
                );

            await updateProfile(
                result.user,
                {
                    displayName: username
                }
            );

            await set(
                ref(db,"users/" + result.user.uid),
                {
                    uid: result.user.uid,
                    name: username,
                    email: loginInput,
                }
            );

            alert("Đăng ký thành công");

            window.location.href =
                "index.html";
        }

    }catch(error){

        errorBox.innerText =
            error.message;
    }
}

</script>

</body>
</html>
