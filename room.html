<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rich-Town | Room</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root{
            --bg1:#0c1020;
            --bg2:#111827;
            --card:rgba(255,255,255,.07);
            --card-2:rgba(255,255,255,.09);
            --line:rgba(255,255,255,.12);
            --text:#ffffff;
            --muted:#b7c0d1;
            --gold:#ffd54a;
            --green:#34d399;
            --red:#fb7185;
            --blue:#60a5fa;
            --shadow:0 18px 60px rgba(0,0,0,.35);
            --radius:22px;
        }

        *{ box-sizing:border-box; }
        body{
            margin:0;
            min-height:100vh;
            color:var(--text);
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(96,165,250,.25), transparent 30%),
                radial-gradient(circle at top right, rgba(255,213,74,.18), transparent 28%),
                radial-gradient(circle at bottom left, rgba(52,211,153,.12), transparent 30%),
                linear-gradient(135deg, var(--bg1), var(--bg2));
        }

        .app{
            max-width: 1450px;
            margin: 0 auto;
            padding: 18px;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            gap:16px;
        }

        .topbar{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:16px;
            padding:18px 20px;
            border:1px solid var(--line);
            background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
            backdrop-filter: blur(14px);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .room-info{
            display:flex;
            flex-wrap:wrap;
            align-items:center;
            gap:12px 18px;
        }

        .room-chip{
            padding:10px 14px;
            border-radius:999px;
            background: rgba(255,255,255,.08);
            border:1px solid var(--line);
            color:var(--text);
            font-weight:700;
            letter-spacing:.4px;
        }

        .room-chip.gold{
            background: linear-gradient(135deg, rgba(255,213,74,.2), rgba(255,213,74,.08));
            border-color: rgba(255,213,74,.25);
            color: #fff8cf;
        }

        .notice{
            margin-left:auto;
            color:var(--muted);
            font-size:14px;
        }

        .layout{
            flex:1;
            display:grid;
            grid-template-columns: minmax(0, 1.75fr) 360px;
            gap:16px;
            align-items:stretch;
        }

        .left-panel,
        .right-panel{
            border:1px solid var(--line);
            background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.045));
            backdrop-filter: blur(14px);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow:hidden;
        }

        .left-panel{
            padding:16px;
            display:flex;
            flex-direction:column;
            gap:16px;
        }

        .right-panel{
            padding:16px;
            display:flex;
            flex-direction:column;
            gap:14px;
        }

        .section-title{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:10px;
            margin-bottom:10px;
        }

        .section-title h3{
            margin:0;
            font-size:16px;
            letter-spacing:.3px;
        }

        .section-title span{
            color:var(--muted);
            font-size:13px;
        }

        .players-card,
        .friends-card,
        .actions-card,
        .status-card{
            border:1px solid var(--line);
            background: rgba(255,255,255,.05);
            border-radius: 20px;
            padding:14px;
        }

        .players-grid{
            display:grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap:12px;
        }

        .player-slot{
            min-height:108px;
            border-radius:18px;
            border:1px dashed rgba(255,255,255,.18);
            background: rgba(255,255,255,.03);
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:12px;
            position:relative;
            overflow:hidden;
            transition: transform .15s ease, border-color .15s ease, background .15s ease;
        }

        .player-slot:hover{
            transform: translateY(-2px);
            border-color: rgba(255,255,255,.28);
            background: rgba(255,255,255,.05);
        }

        .player-slot.empty{
            color: rgba(255,255,255,.45);
            font-size:34px;
            font-weight:800;
        }

        .player-slot {
    position: relative;
}

.kick-btn {
    position: absolute;
    top: -8px;
    right: -8px;
    background: #ff4d4d;
    color: white;
    border: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    z-index: 10;
}

        .avatar{
            width:44px;
            height:44px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:800;
            color:#0b1020;
            background: linear-gradient(135deg, #ffd54a, #fff3af);
            box-shadow: 0 10px 24px rgba(255,213,74,.25);
            margin-bottom:8px;
            flex-shrink:0;
        }

        .name{
            font-weight:700;
            line-height:1.1;
            word-break:break-word;
        }

        .sub{
            margin-top:5px;
            font-size:12px;
            color:var(--muted);
        }

        .badge{
            position:absolute;
            top:10px;
            right:10px;
            padding:6px 8px;
            border-radius:999px;
            font-size:11px;
            font-weight:700;
            color:#0b1020;
            background:var(--gold);
        }

        .badge.ready{
            background: linear-gradient(135deg, #34d399, #86efac);
        }

        .badge.host{
            background: linear-gradient(135deg, #f8b84e, #ffd54a);
        }

        .slot.me{
            border-color: rgba(96,165,250,.55);
            box-shadow: inset 0 0 0 1px rgba(96,165,250,.18);
        }

        .slot.ready{
            border-color: rgba(52,211,153,.6);
            box-shadow: inset 0 0 0 1px rgba(52,211,153,.15);
        }

        .slot.host{
            border-color: rgba(255,213,74,.7);
        }


        .role-btn .r1{
            display:block;
            font-size:15px;
            font-weight:800;
            margin-bottom:4px;
        }

        .role-btn .r2{
            display:block;
            font-size:12px;
            color:var(--muted);
        }


        .friend-list{
            display:flex;
            flex-direction:column;
            gap:10px;
            max-height: 490px;
            overflow:auto;
            padding-right:4px;
        }

        .friend-item{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:10px;
            padding:12px;
            border-radius:16px;
            background: rgba(255,255,255,.05);
            border:1px solid rgba(255,255,255,.08);
        }

        .friend-left{
            display:flex;
            align-items:center;
            gap:10px;
            min-width:0;
        }

        .friend-avatar{
            width:38px;
            height:38px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:800;
            background: linear-gradient(135deg, rgba(255,213,74,.95), rgba(255,243,175,.95));
            color:#111827;
            flex-shrink:0;
        }

        .friend-meta{
            min-width:0;
        }

        .friend-name{
            font-weight:700;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            max-width:170px;
        }

        .friend-sub{
            font-size:12px;
            color:var(--muted);
            margin-top:3px;
        }

        .invite-btn{
            border:none;
            border-radius:999px;
            padding:9px 12px;
            background: linear-gradient(135deg, rgba(52,211,153,.9), rgba(134,239,172,.9));
            color:#062012;
            font-weight:800;
            cursor:pointer;
            flex-shrink:0;
        }

        .actions-card{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            margin-top:auto;
        }

        .actions-left{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .action-btn{
            border:none;
            border-radius:16px;
            padding:14px 18px;
            font-weight:900;
            cursor:pointer;
            transition: transform .15s ease, filter .15s ease, opacity .15s ease;
            min-width: 140px;
        }

        .action-btn:hover{
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .action-btn.exit{
            background: rgba(251,113,133,.15);
            color:#ffd1da;
            border:1px solid rgba(251,113,133,.22);
        }

        .action-btn.ready{
            background: linear-gradient(135deg, rgba(96,165,250,.9), rgba(125,211,252,.95));
            color:#03111e;
        }

        .action-btn.start{
            background: linear-gradient(135deg, rgba(255,213,74,.95), rgba(255,238,159,.98));
            color:#151515;
        }

        .action-btn.done{
            background: linear-gradient(135deg, rgba(52,211,153,.95), rgba(134,239,172,.98));
            color:#062012;
        }

        .status-card{
            padding:14px 16px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
        }

        .status-pill{
            padding:8px 12px;
            border-radius:999px;
            background: rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.12);
            color:var(--muted);
            font-size:13px;
            font-weight:700;
        }

        .status-pill.ok{
            color:#e6fff2;
            background: rgba(52,211,153,.14);
            border-color: rgba(52,211,153,.2);
        }

        .status-pill.warn{
            color:#fff2cf;
            background: rgba(255,213,74,.12);
            border-color: rgba(255,213,74,.2);
        }

        .small{
            color:var(--muted);
            font-size:13px;
            line-height:1.45;
        }

        .loading{
            padding:14px;
            color:var(--muted);
        }

        @media (max-width: 1100px){
            .layout{
                grid-template-columns: 1fr;
            }
            .right-panel{
                order:2;
            }
        }

        @media (max-width: 780px){
            .topbar{
                flex-direction:column;
                align-items:flex-start;
            }

            .notice{
                margin-left:0;
            }

            .players-grid{
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .role-buttons{
                grid-template-columns: 1fr;
            }

            .actions-card{
                flex-direction:column;
                align-items:stretch;
            }

            .actions-left{
                width:100%;
            }

            .action-btn{
                width:100%;
                min-width:0;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="room-info">
                <div class="room-chip gold">MÃ PHÒNG: <span id="roomCode">---</span></div>
                <div class="room-chip">NGƯỜI CHƠI: <span id="playerCount">0/8</span></div>
                <div class="room-chip">CHỦ PHÒNG: <span id="hostName">---</span></div>
            </div>
            <div class="notice" id="notice">Đang tải phòng...</div>
        </div>

        <div class="layout">
            <div class="left-panel">
                <div class="players-card">
                    <div class="section-title">
                        <h3>KHU VỰC NGƯỜI CHƠI</h3>
                        <span>8 ô tối đa</span>
                    </div>
                    <div class="players-grid" id="playersGrid"></div>
                </div>


                <div class="actions-card">
                    <div>
                        <div class="section-title" style="margin:0 0 6px 0;">
                            <h3>THAO TÁC</h3>
                        </div>
                        <div class="small" id="roomHint">Bạn đang ở trong phòng chờ.</div>
                    </div>

                    <div class="actions-left" id="actionButtons"></div>
                </div>
            </div>

            <div class="right-panel">
                <div class="friends-card">
                    <div class="section-title">
                        <h3>BẠN BÈ ONLINE</h3>
                        <span>Chạm để mời</span>
                    </div>
                    <div class="friend-list" id="friendsList">
                        <div class="loading">Đang tải danh sách...</div>
                    </div>
                </div>

                <div class="status-card">
                    <div>
                        <div style="font-weight:800; font-size:15px;">Trạng thái phòng</div>
                        <div class="small" id="statusText">waiting</div>
                    </div>
                    <div class="status-pill" id="statusPill">ĐANG CHỜ</div>
                </div>
            </div>
        </div>
    </div>

    <script>
  const firebaseConfig = {
    apiKey: "AIzaSyCeg9m4AuIJxr6PCxYnC7WJ4hmWgJPB180",
    authDomain: "rich-town.firebaseapp.com",
    databaseURL: "https://rich-town-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rich-town",
    storageBucket: "rich-town.firebasestorage.app",
    messagingSenderId: "404583018538",
    appId: "1:404583018538:web:2bdeb6f2d26f7aa4221353",
    measurementId: "G-K2S8KPCW45"
  };

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.database();

  const params = new URLSearchParams(location.search);
  const roomId = (params.get("id") || "").trim().toUpperCase();
  const roomRef = roomId ? db.ref("rooms/" + roomId) : null;

  let currentUser = null;
  let currentUserData = null;
  let currentRoom = null;
  let friendsLoaded = false;
  let redirectingToGame = false;
  let heartbeat = null;

  const el = {
    roomCode: document.getElementById("roomCode"),
    playerCount: document.getElementById("playerCount"),
    hostName: document.getElementById("hostName"),
    playersGrid: document.getElementById("playersGrid"),
    friendsList: document.getElementById("friendsList"),
    notice: document.getElementById("notice"),
    statusText: document.getElementById("statusText"),
    statusPill: document.getElementById("statusPill"),
    actionButtons: document.getElementById("actionButtons"),
    roomHint: document.getElementById("roomHint"),
  };

  function setNotice(msg) {
    el.notice.textContent = msg;
  }

  function escapeHtml(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function initials(name) {
    const clean = String(name || "RT").trim();
    if (!clean) return "RT";
    const parts = clean.split(/\s+/).filter(Boolean);
    if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    return clean.slice(0, 2).toUpperCase();
  }

  function getPlayerEntries(players) {
    return Object.entries(players || {}).sort((a, b) => {
      return (a[1].joinedAt || 0) - (b[1].joinedAt || 0);
    });
  }


  // Heartbeat mỗi 5 giây
        
  function renderPlayers(room) {
    const players = room.players || {};
    const entries = getPlayerEntries(players);
    const hostId = room.hostId || "";
    const isHostMe = currentUser.uid === hostId;

    el.playerCount.textContent = `${entries.length}/8`;
    el.hostName.textContent =
        entries.find(([uid]) => uid === hostId)?.[1]?.name || "Chưa xác định";

    const slots = [];

    for (let i = 0; i < 8; i++) {
        const item = entries[i];

        if (!item) {
            slots.push(`
          <div class="player-slot empty">
            +
            <div class="sub">Ô trống</div>
          </div>
        `);
            continue;
        }

        const [uid, player] = item;
        const isMe = uid === currentUser?.uid;
        const isHost = uid === hostId;
        const ready = !!player.ready;

        const classes = ["player-slot", "slot"];
        if (isMe) classes.push("me");
        if (isHost) classes.push("host");
        if (ready) classes.push("ready");

        const badges = [];
        if (isHost) badges.push(`<div class="badge host">👑 Host</div>`);
        if (ready) badges.push(`<div class="badge ready" style="${isHost ? "top:42px;" : ""}">✓ Sẵn sàng</div>`);

        const kickBtn = (isHostMe && !isMe)
            ? `<button class="kick-btn" onclick="kickPlayer('${uid}')">×</button>`
            : "";

        slots.push(`
        <div class="${classes.join(" ")}">
          ${kickBtn}
          ${badges.join("")}
          <div class="avatar">${escapeHtml(initials(player.name))}</div>
          <div class="name">${escapeHtml(player.name || "Người chơi")}</div>
          <div class="sub">${isMe ? "Bạn" : "Trong phòng"}</div>
        </div>
      `);
    }

    el.playersGrid.innerHTML = slots.join("");
}

  

  function renderActions(room) {
    const players = room.players || {};
    const myUid = currentUser?.uid;
    const isHost = room.hostId === myUid;
    const me = players?.[myUid];
    const isReady = !!me?.ready;

    el.actionButtons.innerHTML = "";

    const leaveBtn = document.createElement("button");
    leaveBtn.className = "action-btn exit";
    leaveBtn.textContent = "THOÁT";
    leaveBtn.onclick = leaveRoom;

    if (isHost) {
      const startBtn = document.createElement("button");
      startBtn.className = "action-btn start";
      startBtn.textContent = "BẮT ĐẦU";
      startBtn.onclick = startGame;

      el.actionButtons.appendChild(leaveBtn);
      el.actionButtons.appendChild(startBtn);
      el.roomHint.textContent = "Bạn là chủ phòng. Chỉ bạn mới được bấm Bắt đầu.";
    } else {
      const readyBtn = document.createElement("button");
      readyBtn.className = "action-btn " + (isReady ? "done" : "ready");
      readyBtn.textContent = isReady ? "✓ ĐÃ SẴN SÀNG" : "SẴN SÀNG";
      readyBtn.onclick = toggleReady;

      el.actionButtons.appendChild(leaveBtn);
      el.actionButtons.appendChild(readyBtn);
      el.roomHint.textContent = "Hãy bấm Sẵn sàng khi đã chuẩn bị.";
    }
  }

  function renderRoom(room) {
    currentRoom = room;

    el.roomCode.textContent = room.roomId || roomId || "---";
    el.statusText.textContent = room.status || "waiting";

    if (room.status === "playing") {
      el.statusPill.textContent = "ĐANG CHƠI";
      el.statusPill.className = "status-pill ok";
    } else {
      el.statusPill.textContent = "ĐANG CHỜ";
      el.statusPill.className = "status-pill warn";
    }

    renderPlayers(room);
    renderActions(room);
    setNotice(room.status === "playing" ? "Phòng đã bắt đầu, đang chuyển vào game..." : "Phòng đang chờ người chơi.");
  }

  async function ensureJoinedRoom() {
    if (!roomRef) {
      alert("Thiếu mã phòng.");
      location.replace("index.html");
      return;
    }

    const roomSnap = await roomRef.once("value");
    if (!roomSnap.exists()) {
      alert("Phòng không tồn tại!");
      location.replace("index.html");
      return;
    }

    const room = roomSnap.val() || {};
    const players = room.players || {};
    const count = Object.keys(players).length;

    if (room.status === "playing") {
      alert("Phòng đã bắt đầu!");
      location.replace("game.html?id=" + roomId);
      return;
    }

    if (!players[currentUser.uid]) {
      if (count >= 8) {
        alert("Phòng đã đầy!");
        location.replace("index.html");
        return;
      }

      const name = currentUserData?.name || currentUser.displayName || currentUser.email || "Người chơi";
      await roomRef.child(`players/${currentUser.uid}`).set({
    name,
    ready:false,
    joinedAt: firebase.database.ServerValue.TIMESTAMP
});
    }
  }

  function watchRoom() {
    roomRef.on("value", snap => {
      if (!snap.exists()) {
        alert("Phòng đã bị xóa!");
        location.replace("index.html");
        return;
      }

      const room = snap.val() || {};
      renderRoom(room);

      if (room.status === "playing" && !redirectingToGame) {
        redirectingToGame = true;
        setTimeout(() => {
          location.replace("game.html?id=" + roomId);
        }, 300);
      }
    });
  }

        function setupPresence() {

    if (!currentUser) return;

    const userRef = db.ref(`users/${currentUser.uid}`);
    const connectedRef = db.ref(".info/connected");

    connectedRef.on("value", snap => {

        if (snap.val() === true) {

            userRef.onDisconnect().update({
                status: "offline",
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });

            userRef.update({
                status: "room",
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });
        }
    });

    if (heartbeat) clearInterval(heartbeat);

    heartbeat = setInterval(() => {

        userRef.update({
            status: "room",
            lastSeen: firebase.database.ServerValue.TIMESTAMP
        });

    }, 10000);
}

  function loadFriends() {

    db.ref("users").on("value", snap => {

        try {

            const users = snap.val() || {};

            const list = Object.entries(users)
            .filter(([uid]) => uid !== currentUser.uid)
            .map(([uid, u]) => {

    let status = u?.status || "offline";


    return {
    uid,
    name: u?.name || "Người chơi",
    status
};

})
            .slice(0, 12);

            if (!list.length) {

                el.friendsList.innerHTML =
                `<div class="loading">
                    Chưa có ai khác trong hệ thống.
                </div>`;

                return;
            }

            el.friendsList.innerHTML = list.map(item => `

                <div class="friend-item">

                    <div class="friend-left">

                        <div class="friend-avatar">
                            ${escapeHtml(initials(item.name))}
                        </div>

                        <div class="friend-meta">

                            <div class="friend-name">
                                ${escapeHtml(item.name)}
                            </div>

                            <div class="friend-sub">

                                ${
                                    item.status === "online"
                                    ? "🟢 Online"

                                    : item.status === "room"
                                    ? "🏠 Trong phòng"

                                    : item.status === "playing"
                                    ? "🎮 Đang chơi"

                                    : "⚫ Offline"
                                }

                            </div>

                        </div>

                    </div>

                    <button
    class="invite-btn"
    style="
        opacity:${
            item.status === 'offline' ||
            item.status === 'playing'
            ? '.5'
            : '1'
        };
        cursor:${
            item.status === 'offline' ||
            item.status === 'playing'
            ? 'not-allowed'
            : 'pointer'
        };
    "
                        onclick='inviteFriend("${item.uid}", ${JSON.stringify(item.name)})'
                        ${item.status === "offline" || item.status === "playing" ? "disabled" : ""}
                    >

                        ${
                            item.status === "playing"
                            ? "ĐANG CHƠI"

                            : item.status === "offline"
                            ? "OFFLINE"

                            : "MỜI"
                        }

                    </button>

                </div>

            `).join("");

        } catch (e) {

            console.error(e);

            el.friendsList.innerHTML =
            `<div class="loading">
                Không tải được danh sách bạn bè.
            </div>`;
        }

    });
}

  window.inviteFriend = async function(uid, name) {
    try {
      await db.ref(`invites/${uid}`).push({
        fromUid: currentUser.uid,
        fromName: currentUserData?.name || currentUser.displayName || "Người chơi",
        roomId,
        createdAt: firebase.database.ServerValue.TIMESTAMP
      });

      alert(`Đã gửi lời mời cho ${name}`);
    } catch (e) {
      console.error(e);
      alert("Không thể gửi lời mời");
    }
  };


  window.toggleReady = async function() {
    if (!currentUser || !currentRoom) return;

    const me = currentRoom.players?.[currentUser.uid];
    if (!me) return;

    const next = !me.ready;
    try {
      await roomRef.child(`players/${currentUser.uid}/ready`).set(next);
      setNotice(next ? "Bạn đã sẵn sàng." : "Bạn đã bỏ sẵn sàng.");
    } catch (e) {
      console.error(e);
      alert("Không thể đổi trạng thái sẵn sàng.");
    }
  };

  async function startGame() {
    if (!currentRoom || currentRoom.hostId !== currentUser.uid) return;

    try {
      const roomSnap = await roomRef.once("value");
      const room = roomSnap.val() || {};
      const entries = getPlayerEntries(room.players || {});
      const players = room.players || {};

      if (entries.length < 2) {
        alert("Cần ít nhất 2 người trong phòng.");
        return;
      }

      const allReady = entries.every(([uid, p]) => {
        if (uid === room.hostId) return true;
        return p.ready === true;
      });

      

      if (!allReady) {
        alert("Có người chơi chưa sẵn sàng.");
        return;
      }

      const updates = {};
      Object.keys(players).forEach(uid => {
        updates[`users/${uid}/status`] = "playing";
      });
      updates[`rooms/${roomId}/status`] = "playing";

      await db.ref().update(updates);

      redirectingToGame = true;
      location.replace("game.html?id=" + roomId);
    } catch (e) {
      console.error(e);
      alert("Không thể bắt đầu game.");
    }
  }

  async function leaveRoom() {
    try {
      if (!currentUser) {
        location.replace("index.html");
        return;
      }

      if (roomRef) {
        const roomSnap = await roomRef.once("value");
        const room = roomSnap.val();
        const userRef = db.ref(`users/${currentUser.uid}`);

        await userRef.onDisconnect().cancel();

        if (room && room.players && room.players[currentUser.uid]) {
          const players = room.players || {};
          const remaining = Object.entries(players).filter(([id]) => id !== currentUser.uid);

          const updates = {};
          updates[`rooms/${roomId}/players/${currentUser.uid}`] = null;

          if (remaining.length === 0) {
            updates[`rooms/${roomId}`] = null;
          } else if (room.hostId === currentUser.uid) {
            updates[`rooms/${roomId}/hostId`] = remaining[0][0];
          }

          await db.ref().update(updates);
        }

        await userRef.update({
          status: "online",
          lastSeen: firebase.database.ServerValue.TIMESTAMP
        });
      }

      location.replace("index.html");
    } catch (e) {
      console.error(e);
      location.replace("index.html");
    }
  }

  auth.onAuthStateChanged(async user => {
  if (!user) {
    location.replace("auth.html");
    return;
  }

  currentUser = user;


  try {
  } catch (e) {}

  // 👉 LẤY USER DATA ĐÚNG CHỖ
  const userSnap = await db.ref(`users/${currentUser.uid}`).once("value");
  currentUserData = userSnap.val() || {
    name: user.displayName || user.email || "Người chơi"
  };

  if (!roomId) {
    alert("Thiếu mã phòng.");
    location.replace("index.html");
    return;
  }

  loadFriends();

  try {
    await db.ref(`users/${currentUser.uid}`).update({
    status: "room",
    lastSeen: firebase.database.ServerValue.TIMESTAMP
});

    await ensureJoinedRoom();
      currentRoom = { roomId };
setupPresence();
    setNotice("Đã vào phòng.");
    watchRoom();
  } catch (e) {
    console.error(e);
    alert("Không thể vào phòng.");
    location.replace("index.html");
  }
});
        window.kickPlayer = async function(uid) {
    if (!confirm("Bạn có chắc chắn muốn mời người này ra khỏi phòng?")) return;
    
    try {
        // Xóa player khỏi danh sách phòng trong DB
        await db.ref(`rooms/${roomId}/players/${uid}`).remove();
        
        // Đưa trạng thái user về online (nếu cần)
        await db.ref(`users/${uid}/status`).set("online");
        
        setNotice("Đã kick người chơi.");
    } catch (e) {
        console.error(e);
        alert("Không thể kick người chơi.");
    }
};
</script>
