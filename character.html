<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-container">
    <aside class="col-left">
        <div class="selection-row">
            <select id="charSelect"><option>Character</option></select>
            <select id="skinSelect"><option>Skin</option></select>
        </div>
        <div class="char-list" id="charList"></div>
    </aside>

    <main class="col-center">
        <div class="avatar-display">
            <div class="avatar-circle" id="charAvatar"></div>
        </div>
        <h1 id="charName">Name</h1>
        <div class="level-badge">LVL <span id="charLevel">1</span></div>
    </main>

    <aside class="col-right">
        <div class="stats-panel">
            <h2>Attributes</h2>
            <div id="statsContainer"></div>
            <h3>Sub-stats</h3>
            <div id="subStatsContainer" class="sub-stats"></div>
        </div>
    </aside>

    <footer class="footer-actions">
        <button class="btn-main">Select Character</button>
        <button class="btn-main">Upgrade</button>
        <button class="btn-main back">Back</button>
    </footer>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
