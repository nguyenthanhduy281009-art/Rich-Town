<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <header class="top-nav">
            <h2 class="title">NHÂN VẬT</h2>
            <button class="back-btn">Quay lại</button>
        </header>

        <main class="main-screen">
            <aside class="hero-list">
                <div class="hero-item active">Tanker</div>
                <div class="hero-item">Hunter</div>
                <div class="hero-item">Mage</div>
                <div class="hero-item">Assassin</div>
            </aside>

            <section class="hero-preview">
                <div class="avatar-glow">
                    <div class="avatar-circle"></div>
                </div>
                <h1 class="hero-name">Tanker</h1>
                <p class="hero-lv">LEVEL 10</p>
                <div class="action-buttons">
                    <button class="btn-primary">Chọn</button>
                    <button class="btn-secondary">Nâng cấp</button>
                </div>
            </section>

            <aside class="hero-stats">
                <h3>Chỉ số</h3>
                <div class="stat-group">
                    <label>HP</label>
                    <div class="bar-bg"><div class="bar-fill" style="width: 90%;"></div></div>
                </div>
                <div class="stat-group">
                    <label>Speed</label>
                    <div class="bar-bg"><div class="bar-fill" style="width: 60%;"></div></div>
                </div>
                <div class="stat-group">
                    <label>Crit</label>
                    <div class="bar-bg"><div class="bar-fill" style="width: 45%;"></div></div>
                </div>
            </aside>
        </main>
    </div>
</body>
</html>
