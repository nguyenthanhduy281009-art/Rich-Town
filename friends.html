<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich-Town | Bạn bè</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    :root{
      --bg1:#090d1a;
      --bg2:#11182a;
      --card:rgba(255,255,255,.06);
      --card-2:rgba(255,255,255,.09);
      --line:rgba(255,255,255,.12);
      --text:#f8fbff;
      --muted:#acb6c9;
      --gold:#ffd54a;
      --green:#2ddc84;
      --yellow:#ffcf5c;
      --blue:#5db0ff;
      --gray:#8893a8;
      --red:#ff7b7b;
      --shadow:0 20px 60px rgba(0,0,0,.38);
      --radius:24px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(93,176,255,.18), transparent 26%),
        radial-gradient(circle at 90% 15%, rgba(255,213,74,.14), transparent 24%),
        radial-gradient(circle at 50% 90%, rgba(45,220,132,.12), transparent 28%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
    }

    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:18px;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .hero{
      padding:18px 20px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .hero-left{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .hero-icon{
      width:52px;
      height:52px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg, rgba(255,213,74,.22), rgba(93,176,255,.16));
      border:1px solid rgba(255,255,255,.12);
      flex-shrink:0;
      font-size:24px;
    }

    .hero h1{
      margin:0;
      font-size:22px;
      letter-spacing:.3px;
    }

    .hero p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .hero-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-left:auto;
    }

    .chip{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      color:var(--text);
      font-weight:700;
      font-size:13px;
      white-space:nowrap;
    }

    .back-btn{
      border:none;
      cursor:pointer;
      padding:12px 16px;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      color:#fff;
      font-weight:800;
      border:1px solid var(--line);
      transition:.15s ease;
      white-space:nowrap;
    }

    .back-btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.12);
    }

    .panel{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:rgba(255,255,255,.055);
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow);
      padding:16px;
    }

    .toolbar{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .search{
      flex:1;
      min-width:240px;
      position:relative;
    }

    .search input{
      width:100%;
      padding:14px 16px 14px 46px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      outline:none;
      background:rgba(0,0,0,.18);
      color:#fff;
      font-size:14px;
    }

    .search input::placeholder{ color:#95a2ba; }

    .search .icon{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      color:#aeb9cf;
      font-size:16px;
      pointer-events:none;
    }

    .count{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:14px;
    }

    .friend-card{
      position:relative;
      overflow:hidden;
      min-height:240px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.10);
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
      padding:16px;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      transition:.16s ease;
    }

    .friend-card:hover{
      transform:translateY(-2px);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border-color:rgba(255,255,255,.16);
    }

    .avatar-wrap{
      width:92px;
      height:92px;
      margin-top:4px;
      margin-bottom:14px;
      position:relative;
      flex-shrink:0;
    }

    .avatar{
      width:100%;
      height:100%;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg, #ffd54a, #fff1b4);
      color:#121826;
      font-size:30px;
      font-weight:900;
      overflow:hidden;
      box-shadow:0 14px 30px rgba(255,213,74,.16);
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .status-dot{
      position:absolute;
      right:3px;
      bottom:3px;
      width:18px;
      height:18px;
      border-radius:50%;
      border:3px solid #0f1423;
      background:var(--gray);
    }

    .online{ background:var(--green); }
    .room{ background:var(--yellow); }
    .playing{ background:var(--blue); }
    .offline{ background:var(--gray); }

    .name{
      font-size:16px;
      font-weight:900;
      line-height:1.2;
      word-break:break-word;
      margin-top:2px;
    }

    .id{
      margin-top:7px;
      color:var(--muted);
      font-size:13px;
      letter-spacing:.2px;
    }

    .status-pill{
      margin-top:12px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
      font-weight:800;
    }

    .status-pill.online{ color:#c9ffe0; }
    .status-pill.room{ color:#fff0bf; }
    .status-pill.playing{ color:#d7ebff; }
    .status-pill.offline{ color:#d6dbe4; }

    .empty-state{
      grid-column:1/-1;
      min-height:320px;
      border-radius:22px;
      border:1px dashed rgba(255,255,255,.16);
      background:
        radial-gradient(circle at top, rgba(255,213,74,.08), transparent 40%),
        rgba(255,255,255,.03);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:26px;
      gap:10px;
    }

    .empty-emoji{
      width:74px;
      height:74px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
    }

    .empty-state h2{
      margin:0;
      font-size:20px;
    }

    .empty-state p{
      margin:0;
      max-width:420px;
      color:var(--muted);
      line-height:1.55;
    }

    .empty-actions{
      margin-top:8px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .btn{
      border:none;
      cursor:pointer;
      padding:12px 16px;
      border-radius:14px;
      font-weight:800;
      transition:.15s ease;
    }

    .btn.primary{
      background:linear-gradient(135deg, #ffd54a, #fff1a8);
      color:#111;
    }

    .btn.secondary{
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .loading{
      grid-column:1/-1;
      min-height:220px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      border-radius:22px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }

    @media (max-width: 1050px){
      .grid{ grid-template-columns:repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 760px){
      .grid{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
      .hero{ padding:16px; }
      .back-btn{ width:100%; }
      .hero-actions{ width:100%; }
      .chip{ flex:1; text-align:center; }
    }

    @media (max-width: 520px){
      .grid{ grid-template-columns:1fr; }
      .toolbar{ flex-direction:column; align-items:stretch; }
      .search{ min-width:0; }
      .count{ text-align:center; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="hero-left">
        <div class="hero-icon">👥</div>
        <div>
          <h1>Bạn bè</h1>
          <p>Quản lý danh sách bạn bè của bạn trong Rich-Town</p>
        </div>
      </div>

      <div class="hero-actions">
        <div class="chip" id="friendsCountChip">0 bạn bè</div>
        <button class="back-btn" onclick="window.location.href='index.html'">← Quay lại</button>
      </div>
    </div>

    <div class="panel">
      <div class="toolbar">
        <div class="search">
          <span class="icon">🔎</span>
          <input id="searchInput" type="text" placeholder="Tìm theo tên hoặc ID..." />
        </div>
        <div class="count" id="countText">Đang tải...</div>
      </div>

      <div class="grid" id="friendsGrid">
        <div class="loading">Đang tải danh sách bạn bè...</div>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCeg9m4AuIJxr6PCxYnC7WJ4hmWgJPB180",
      authDomain: "rich-town.firebaseapp.com",
      databaseURL: "https://rich-town-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rich-town",
      storageBucket: "rich-town.firebasestorage.app",
      messagingSenderId: "404583018538",
      appId: "1:404583018538:web:2bdeb6f2d26f7aa4221353",
      measurementId: "G-K2S8KPCW45"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const grid = document.getElementById("friendsGrid");
    const countText = document.getElementById("countText");
    const friendsCountChip = document.getElementById("friendsCountChip");
    const searchInput = document.getElementById("searchInput");

    let currentUser = null;
    let allFriends = [];

    function initials(name) {
      const s = String(name || "RT").trim();
      if (!s) return "RT";
      const parts = s.split(/\s+/).filter(Boolean);
      if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
      return s.slice(0, 2).toUpperCase();
    }

    function statusText(status) {
      switch ((status || "").toLowerCase()) {
        case "online": return "Online";
        case "room": return "Trong phòng";
        case "playing": return "Đang chơi";
        default: return "Offline";
      }
    }

    function statusClass(status) {
      switch ((status || "").toLowerCase()) {
        case "online": return "online";
        case "room": return "room";
        case "playing": return "playing";
        default: return "offline";
      }
    }

    function render(list) {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = list.filter(item => {
        const name = (item.name || "").toLowerCase();
        const id = (item.playerId || "").toLowerCase();
        return !q || name.includes(q) || id.includes(q);
      });

      countText.textContent = `Đang hiển thị ${filtered.length}/${list.length} bạn bè`;
      friendsCountChip.textContent = `${list.length} bạn bè`;

      if (!filtered.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-emoji">✨</div>
            <h2>Chưa có bạn bè</h2>
            <p>Danh sách của bạn đang trống. Khi có người chơi được thêm vào danh sách bạn bè, họ sẽ hiện ở đây với avatar, tên, ID và trạng thái.</p>
            <div class="empty-actions">
              <button class="btn primary" onclick="window.location.href='index.html'">Về trang chủ</button>
              <button class="btn secondary" onclick="location.reload()">Tải lại</button>
            </div>
          </div>
        `;
        return;
      }

      grid.innerHTML = filtered.map(item => {
        const cls = statusClass(item.status);
        const avatar = item.avatarUrl
          ? `<img src="${item.avatarUrl}" alt="avatar">`
          : `<span>${initials(item.name)}</span>`;

        return `
          <div class="friend-card">
            <div class="avatar-wrap">
              <div class="avatar">${avatar}</div>
              <div class="status-dot ${cls}"></div>
            </div>
            <div class="name">${item.name || "Người chơi"}</div>
            <div class="id">ID: ${item.playerId || "---"}</div>
            <div class="status-pill ${cls}">${statusText(item.status)}</div>
          </div>
        `;
      }).join("");
    }

    async function loadFriends() {
      if (!currentUser) return;

      grid.innerHTML = `<div class="loading">Đang tải danh sách bạn bè...</div>`;

      try {
        const friendSnap = await db.ref(`friends/${currentUser.uid}`).once("value");
        const friendData = friendSnap.val() || {};
        const friendIds = Object.keys(friendData);

        if (!friendIds.length) {
          allFriends = [];
          render(allFriends);
          return;
        }

        const result = await Promise.all(friendIds.map(async uid => {
          const snap = await db.ref(`users/${uid}`).once("value");
          const u = snap.val() || {};
          return {
            uid,
            name: u.name || "Người chơi",
            playerId: u.playerId || u.id || uid.substring(0, 6).toUpperCase(),
            avatarUrl: u.avatar || u.avatarUrl || "",
            status: u.status || "offline"
          };
        }));

        allFriends = result;
        render(allFriends);
      } catch (e) {
        console.error(e);
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-emoji">⚠️</div>
            <h2>Không tải được danh sách</h2>
            <p>Đã xảy ra lỗi khi lấy dữ liệu bạn bè từ Firebase.</p>
            <div class="empty-actions">
              <button class="btn primary" onclick="location.reload()">Thử lại</button>
              <button class="btn secondary" onclick="window.location.href='index.html'">Về trang chủ</button>
            </div>
          </div>
        `;
        countText.textContent = "Lỗi tải dữ liệu";
      }
    }

    searchInput.addEventListener("input", () => render(allFriends));

    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "auth.html";
        return;
      }
      currentUser = user;
      loadFriends();
    });
  </script>
</body>
</html>
