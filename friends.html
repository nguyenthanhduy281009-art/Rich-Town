<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich-Town | Bạn bè</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    :root{
      --bg1:#0b1020;
      --bg2:#111827;
      --card:rgba(255,255,255,.07);
      --line:rgba(255,255,255,.12);
      --text:#fff;
      --muted:#b8c0d4;
      --gold:#ffd54a;
      --green:#34d399;
      --yellow:#facc15;
      --blue:#60a5fa;
      --gray:#94a3b8;
      --red:#f87171;
      --shadow:0 18px 60px rgba(0,0,0,.35);
      --radius:22px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(96,165,250,.22), transparent 30%),
        radial-gradient(circle at top right, rgba(255,213,74,.14), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .app{
      max-width:1200px;
      margin:0 auto;
      padding:18px;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:18px 20px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      backdrop-filter:blur(14px);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .title-block h1{
      margin:0;
      font-size:22px;
      letter-spacing:.5px;
    }

    .title-block p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .back-btn{
      border:none;
      cursor:pointer;
      padding:12px 16px;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      color:#fff;
      font-weight:700;
      border:1px solid var(--line);
      transition:.15s ease;
    }

    .back-btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.12);
    }

    .panel{
      border:1px solid var(--line);
      background:rgba(255,255,255,.055);
      backdrop-filter:blur(14px);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }

    .search-row{
      display:flex;
      gap:10px;
      align-items:center;
      margin-bottom:16px;
    }

    .search-row input{
      width:100%;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      outline:none;
      background:rgba(0,0,0,.18);
      color:#fff;
      font-size:14px;
    }

    .search-row input::placeholder{
      color:#9aa6bc;
    }

    .count{
      margin-top:-4px;
      margin-bottom:14px;
      color:var(--muted);
      font-size:13px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:14px;
    }

    .friend-card{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.05);
      border-radius:20px;
      padding:14px;
      min-height:210px;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      transition:.15s ease;
      overflow:hidden;
    }

    .friend-card:hover{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,.18);
      background:rgba(255,255,255,.07);
    }

    .avatar-wrap{
      width:86px;
      height:86px;
      position:relative;
      margin-top:4px;
      margin-bottom:12px;
      flex-shrink:0;
    }

    .avatar{
      width:100%;
      height:100%;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg, #ffd54a, #fff3b0);
      color:#121826;
      font-size:30px;
      font-weight:900;
      box-shadow:0 12px 30px rgba(255,213,74,.18);
      overflow:hidden;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .status-dot{
      position:absolute;
      right:3px;
      bottom:3px;
      width:18px;
      height:18px;
      border-radius:50%;
      border:3px solid #111827;
      background:var(--gray);
      box-shadow:0 0 0 2px rgba(255,255,255,.03);
    }

    .status-dot.online{ background:var(--green); }
    .status-dot.room{ background:var(--yellow); }
    .status-dot.playing{ background:var(--blue); }
    .status-dot.offline{ background:var(--gray); }

    .name{
      font-size:16px;
      font-weight:800;
      line-height:1.2;
      word-break:break-word;
    }

    .id{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      letter-spacing:.2px;
    }

    .status{
      margin-top:10px;
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
      font-weight:800;
    }

    .status.online{ color:#bbf7d0; }
    .status.room{ color:#fef3c7; }
    .status.playing{ color:#dbeafe; }
    .status.offline{ color:#cbd5e1; }

    .empty{
      padding:30px 16px;
      text-align:center;
      color:var(--muted);
      border:1px dashed rgba(255,255,255,.14);
      border-radius:18px;
      background:rgba(255,255,255,.03);
    }

    .loading{
      padding:30px 16px;
      text-align:center;
      color:var(--muted);
    }

    @media (max-width: 1000px){
      .grid{ grid-template-columns:repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 760px){
      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .grid{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
      .friend-card{ min-height:200px; }
      .search-row{ flex-direction:column; }
      .back-btn{ width:100%; }
    }

    @media (max-width: 480px){
      .grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-block">
        <h1>👥 Bạn bè</h1>
        <p>Danh sách bạn bè của bạn trong Rich-Town</p>
      </div>
      <button class="back-btn" onclick="window.location.href='index.html'">← Quay lại</button>
    </div>

    <div class="panel">
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Tìm theo tên hoặc ID..." />
      </div>

      <div class="count" id="countText">Đang tải...</div>
      <div class="grid" id="friendsGrid">
        <div class="loading">Đang tải danh sách bạn bè...</div>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCeg9m4AuIJxr6PCxYnC7WJ4hmWgJPB180",
      authDomain: "rich-town.firebaseapp.com",
      databaseURL: "https://rich-town-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rich-town",
      storageBucket: "rich-town.firebasestorage.app",
      messagingSenderId: "404583018538",
      appId: "1:404583018538:web:2bdeb6f2d26f7aa4221353",
      measurementId: "G-K2S8KPCW45"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const grid = document.getElementById("friendsGrid");
    const countText = document.getElementById("countText");
    const searchInput = document.getElementById("searchInput");

    let currentUser = null;
    let allFriends = [];

    function initials(name) {
      const clean = String(name || "RT").trim();
      const parts = clean.split(/\s+/).filter(Boolean);
      if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
      return clean.slice(0, 2).toUpperCase();
    }

    function statusLabel(status) {
      switch ((status || "").toLowerCase()) {
        case "online": return "Online";
        case "room": return "Trong phòng";
        case "playing": return "Đang chơi";
        default: return "Offline";
      }
    }

    function statusClass(status) {
      switch ((status || "").toLowerCase()) {
        case "online": return "online";
        case "room": return "room";
        case "playing": return "playing";
        default: return "offline";
      }
    }

    function renderFriends(list) {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = list.filter(item => {
        const name = (item.name || "").toLowerCase();
        const id = (item.playerId || "").toLowerCase();
        return !q || name.includes(q) || id.includes(q);
      });

      countText.textContent = `Đang hiển thị ${filtered.length}/${list.length} bạn bè`;

      if (!filtered.length) {
        grid.innerHTML = `
          <div class="empty" style="grid-column:1/-1;">
            Không có bạn bè nào phù hợp.
          </div>
        `;
        return;
      }

      grid.innerHTML = filtered.map(item => {
        const avatarHtml = item.avatarUrl
          ? `<img src="${item.avatarUrl}" alt="avatar">`
          : `<span>${initials(item.name)}</span>`;

        return `
          <div class="friend-card">
            <div class="avatar-wrap">
              <div class="avatar">
                ${avatarHtml}
              </div>
              <div class="status-dot ${statusClass(item.status)}"></div>
            </div>

            <div class="name">${item.name || "Người chơi"}</div>
            <div class="id">ID: ${item.playerId || "---"}</div>
            <div class="status ${statusClass(item.status)}">${statusLabel(item.status)}</div>
          </div>
        `;
      }).join("");
    }

    async function loadFriends() {
      if (!currentUser) return;

      grid.innerHTML = `<div class="loading" style="grid-column:1/-1;">Đang tải danh sách bạn bè...</div>`;

      try {
        const friendsSnap = await db.ref(`friends/${currentUser.uid}`).once("value");
        const friendsData = friendsSnap.val() || {};

        const friendIds = Object.keys(friendsData);
        if (!friendIds.length) {
          allFriends = [];
          countText.textContent = "Bạn chưa có bạn bè nào";
          grid.innerHTML = `
            <div class="empty" style="grid-column:1/-1;">
              Chưa có bạn bè. Hãy thêm bạn trong tương lai.
            </div>
          `;
          return;
        }

        const result = await Promise.all(
          friendIds.map(async uid => {
            const snap = await db.ref(`users/${uid}`).once("value");
            const u = snap.val() || {};
            return {
              uid,
              name: u.name || "Người chơi",
              playerId: u.playerId || u.id || uid.substring(0, 6).toUpperCase(),
              avatarUrl: u.avatar || u.avatarUrl || "",
              status: u.status || "offline"
            };
          })
        );

        allFriends = result;
        renderFriends(allFriends);
      } catch (e) {
        console.error(e);
        grid.innerHTML = `
          <div class="empty" style="grid-column:1/-1;">
            Không tải được danh sách bạn bè.
          </div>
        `;
        countText.textContent = "Lỗi tải dữ liệu";
      }
    }

    searchInput.addEventListener("input", () => renderFriends(allFriends));

    auth.onAuthStateChanged(async user => {
      if (!user) {
        window.location.href = "auth.html";
        return;
      }

      currentUser = user;
      await loadFriends();
    });
  </script>
</body>
</html>
